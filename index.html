<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Control Pernos — C134-01</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c0b;--surface:#111413;--surface2:#181c1a;--border:#252926;--green:#00e676;--red:#ff3d3d;--amber:#ffab00;--text:#dde8e0;--dim:#5a6e60;--mono:'Share Tech Mono',monospace;--sans:'Barlow',sans-serif;--cond:'Barlow Condensed',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column;}

header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);}
.hdr-left{display:flex;align-items:center;gap:8px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--dim);transition:all .3s;}
.dot.green{background:var(--green);box-shadow:0 0 8px var(--green);}
.dot.amber{background:var(--amber);box-shadow:0 0 8px var(--amber);}
.hdr-title{font-family:var(--cond);font-weight:700;font-size:15px;letter-spacing:2px;}
.hdr-ref{font-family:var(--mono);font-size:9px;color:var(--dim);}
.badge{font-family:var(--mono);font-size:11px;padding:3px 10px;border:1px solid var(--border);border-radius:2px;color:var(--dim);}
.badge.ok{border-color:rgba(0,230,118,.5);color:var(--green);}
.badge.nok{border-color:rgba(255,61,61,.5);color:var(--red);}

.app{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}

/* Camera top */
.cam-zone{position:relative;flex:0 0 55%;min-height:0;background:#060807;overflow:hidden;}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
#overlay-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:10;pointer-events:none;}
#snap-canvas{display:none;}
.corners{position:absolute;inset:10px;pointer-events:none;z-index:15;}
.c{position:absolute;width:18px;height:18px;}
.c.tl{top:0;left:0;border-top:2px solid var(--green);border-left:2px solid var(--green);}
.c.tr{top:0;right:0;border-top:2px solid var(--green);border-right:2px solid var(--green);}
.c.bl{bottom:0;left:0;border-bottom:2px solid var(--green);border-left:2px solid var(--green);}
.c.br{bottom:0;right:0;border-bottom:2px solid var(--green);border-right:2px solid var(--green);}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);box-shadow:0 0 8px var(--green);z-index:20;top:0;opacity:0;pointer-events:none;}
.scan-line.go{opacity:1;animation:scanmove .8s ease-in-out forwards;}
@keyframes scanmove{0%{top:0%}100%{top:100%}}
.result-overlay{position:absolute;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s;}
.result-overlay.show{opacity:1;}
.result-big{font-family:var(--cond);font-weight:900;font-size:min(25vw,140px);letter-spacing:-4px;text-shadow:0 0 60px currentColor;animation:pop .3s cubic-bezier(.17,.89,.32,1.28);}
.result-big.ok{color:var(--green);}
.result-big.nok{color:var(--red);}
@keyframes pop{0%{transform:scale(.2);opacity:0}100%{transform:scale(1);opacity:1}}

/* Bottom */
.bottom{flex:1;display:flex;min-height:0;border-top:1px solid var(--border);overflow:hidden;}

/* Reference panel */
.ref-panel{flex:1;position:relative;overflow:hidden;background:#080a09;}
.ref-img{width:100%;height:100%;object-fit:contain;display:block;}
.ref-lbl{position:absolute;bottom:6px;left:8px;font-family:var(--mono);font-size:9px;color:rgba(0,230,118,.4);letter-spacing:2px;pointer-events:none;}

/* Controls */
.ctrl{width:140px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;padding:10px;gap:8px;overflow-y:auto;}

.counter-box{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:10px 8px;text-align:center;transition:all .4s;}
.counter-box.ok{border-color:rgba(0,230,118,.5);background:rgba(0,230,118,.06);}
.counter-box.nok{border-color:rgba(255,61,61,.5);background:rgba(255,61,61,.06);}
.counter-num{font-family:var(--cond);font-weight:900;font-size:42px;line-height:1;color:var(--dim);transition:color .3s;}
.counter-num.ok{color:var(--green);}
.counter-num.nok{color:var(--red);}
.counter-sub{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:1px;margin-top:2px;}
.counter-exp{font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:4px;}
.status-txt{font-family:var(--cond);font-weight:700;font-size:17px;letter-spacing:1px;text-align:center;}
.status-txt.ok{color:var(--green);}
.status-txt.nok{color:var(--red);}
.status-txt.idle{color:var(--dim);}
.missing{font-family:var(--mono);font-size:9px;color:var(--red);line-height:1.6;text-align:center;}

.blabel{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:2px;margin-bottom:3px;}

.btn-scan{width:100%;padding:13px 4px;background:transparent;border:2px solid var(--green);border-radius:4px;color:var(--green);font-family:var(--cond);font-weight:700;font-size:17px;letter-spacing:2px;cursor:pointer;position:relative;overflow:hidden;transition:color .2s;}
.btn-scan::before{content:'';position:absolute;inset:0;background:var(--green);transform:translateY(101%);transition:transform .2s;}
.btn-scan:hover{color:var(--bg);}
.btn-scan:hover::before{transform:translateY(0);}
.btn-scan span{position:relative;z-index:1;}
.btn-scan:active{transform:scale(.97);}

.btn-sec{width:100%;padding:7px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--dim);font-size:11px;cursor:pointer;transition:all .2s;}
.btn-sec:hover{border-color:var(--dim);color:var(--text);}

.tabs{display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.tab{flex:1;padding:5px;background:transparent;border:none;color:var(--dim);font-family:var(--mono);font-size:9px;cursor:pointer;transition:all .2s;}
.tab.active{background:var(--surface2);color:var(--green);}

select{background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:var(--mono);font-size:9px;padding:4px 6px;width:100%;outline:none;}
input[type=range]{width:100%;accent-color:var(--green);}
.tol-row{display:flex;justify-content:space-between;align-items:center;}
.tol-val{font-family:var(--mono);font-size:9px;color:var(--amber);}

.upload-zone{border:2px dashed var(--border);border-radius:3px;padding:12px 6px;text-align:center;cursor:pointer;transition:border-color .2s;font-size:10px;color:var(--dim);}
.upload-zone:hover{border-color:var(--green);}
#file-input{display:none;}

.log-entry{font-family:var(--mono);font-size:9px;color:var(--dim);padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.log-entry.ok{color:var(--green);}
.log-entry.nok{color:var(--red);}

@media(min-width:768px){.ctrl{width:180px;}}
</style>
</head>

<script>
const TEMPLATE = [
  {id: 1, x:0.140, y:0.098}, {id: 2, x:0.484, y:0.089}, {id: 3, x:0.842, y:0.084},
  {id: 4, x:0.140, y:0.215}, {id: 5, x:0.200, y:0.223}, {id: 6, x:0.390, y:0.215},
  {id: 7, x:0.484, y:0.203}, {id: 8, x:0.597, y:0.210}, {id: 9, x:0.787, y:0.203},
  {id:10, x:0.844, y:0.190}, {id:11, x:0.143, y:0.305}, {id:12, x:0.847, y:0.282},
  {id:13, x:0.407, y:0.590}, {id:14, x:0.511, y:0.864}, {id:15, x:0.610, y:0.623},
  {id:16, x:0.859, y:0.868}, {id:17, x:0.163, y:0.868},
];
const EXPECTED = 17;
let mode='camera', stream=null, tolerance=40, overlayRAF=null, fileImage=null;

async function initCameras() {
  try {
    const tmp=await navigator.mediaDevices.getUserMedia({video:true});
    tmp.getTracks().forEach(t=>t.stop());
    const devs=await navigator.mediaDevices.enumerateDevices();
    const sel=document.getElementById('cam-select');
    sel.innerHTML=devs.filter(d=>d.kind==='videoinput')
      .map((c,i)=>`<option value="${c.deviceId}">${c.label||'Cámara '+(i+1)}</option>`).join('');
    await startCamera();
  } catch(e) { addLog('Sin cámara'); setMode('file'); }
}

async function startCamera() {
  if(stream) stream.getTracks().forEach(t=>t.stop());
  const deviceId=document.getElementById('cam-select').value;
  try {
    stream=await navigator.mediaDevices.getUserMedia({
      video:deviceId?{deviceId:{exact:deviceId},width:{ideal:1920},height:{ideal:1080}}
                    :{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}
    });
    const v=document.getElementById('video');
    v.srcObject=stream; v.style.display='block';
    document.getElementById('hdr-dot').className='dot green';
    startOverlayLoop();
    addLog('Cámara activa');
  } catch(e) { addLog('Error: '+e.message); }
}

function startOverlayLoop() {
  if(overlayRAF) cancelAnimationFrame(overlayRAF);
  const v=document.getElementById('video');
  function loop() {
    if(v.readyState>=2&&v.videoWidth>0) drawOverlay(v.videoWidth,v.videoHeight,true);
    overlayRAF=requestAnimationFrame(loop);
  }
  loop();
}

function drawOverlay(srcW,srcH,cover) {
  const canvas=document.getElementById('overlay-canvas');
  const W=canvas.parentElement.clientWidth, H=canvas.parentElement.clientHeight;
  if(canvas.width!==W) canvas.width=W;
  if(canvas.height!==H) canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const scale=cover?Math.max(W/srcW,H/srcH):Math.min(W/srcW,H/srcH);
  const offX=(W-srcW*scale)/2, offY=(H-srcH*scale)/2;
  const r=Math.max(10,Math.min(20,W*0.02));
  TEMPLATE.forEach(p=>{
    const px=offX+p.x*srcW*scale, py=offY+p.y*srcH*scale;
    ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,230,118,0.75)'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px-r*.4,py); ctx.lineTo(px+r*.4,py);
    ctx.moveTo(px,py-r*.4); ctx.lineTo(px,py+r*.4);
    ctx.strokeStyle='rgba(0,230,118,0.4)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle='rgba(0,230,118,0.8)';
    ctx.font=`bold ${Math.max(7,Math.round(r*.6))}px monospace`;
    ctx.textAlign='center'; ctx.fillText(p.id,px,py-r-2);
  });
  return {scale,offX,offY};
}

function detect(snap,srcW,srcH,scale,offX,offY) {
  const canvas=document.getElementById('overlay-canvas');
  const W=canvas.width, H=canvas.height;
  const tmp=document.createElement('canvas');
  tmp.width=W; tmp.height=H;
  const tCtx=tmp.getContext('2d');
  tCtx.drawImage(snap,offX,offY,srcW*scale,srcH*scale);
  const d=tCtx.getImageData(0,0,W,H).data;
  return TEMPLATE.map(p=>{
    const cx=Math.round(offX+p.x*srcW*scale), cy=Math.round(offY+p.y*srcH*scale);
    const ir=tolerance, or2=tolerance*2.2;
    let inS=0,inN=0,outS=0,outN=0;
    for(let dy=-or2;dy<=or2;dy++) for(let dx=-or2;dx<=or2;dx++){
      const dist=Math.sqrt(dx*dx+dy*dy);
      const ix=Math.round(cx+dx),iy=Math.round(cy+dy);
      if(ix<0||ix>=W||iy<0||iy>=H) continue;
      const i=(iy*W+ix)*4;
      const score=(d[i]+d[i+1]+d[i+2])/3*.5+(d[i]-d[i+2])/2*.5;
      if(dist<=ir){inS+=score;inN++;} else if(dist<=or2){outS+=score;outN++;}
    }
    const contrast=(inN>0?inS/inN:0)-(outN>0?outS/outN:0);
    return {...p,cx,cy,detected:contrast>5,contrast};
  });
}

function doScan() {
  if(overlayRAF){cancelAnimationFrame(overlayRAF);overlayRAF=null;}
  const sl=document.getElementById('scan-line');
  sl.classList.remove('go'); void sl.offsetWidth; sl.classList.add('go');
  setTimeout(()=>{
    const canvas=document.getElementById('overlay-canvas');
    const W=canvas.parentElement.clientWidth, H=canvas.parentElement.clientHeight;
    let snap,srcW,srcH,scale,offX,offY;
    if(mode==='camera'){
      const v=document.getElementById('video');
      snap=document.getElementById('snap-canvas');
      snap.width=v.videoWidth||1280; snap.height=v.videoHeight||720;
      snap.getContext('2d').drawImage(v,0,0);
      srcW=snap.width; srcH=snap.height;
      scale=Math.max(W/srcW,H/srcH);
      offX=(W-srcW*scale)/2; offY=(H-srcH*scale)/2;
    } else {
      if(!fileImage) return;
      snap=document.getElementById('snap-canvas');
      snap.width=fileImage.naturalWidth; snap.height=fileImage.naturalHeight;
      snap.getContext('2d').drawImage(fileImage,0,0);
      srcW=snap.width; srcH=snap.height;
      scale=Math.min(W/srcW,H/srcH);
      offX=(W-srcW*scale)/2; offY=(H-srcH*scale)/2;
    }
    const results=detect(snap,srcW,srcH,scale,offX,offY);
    showResult(results);
  },450);
}

function showResult(results) {
  const detected=results.filter(r=>r.detected).length;
  const isOK=detected===EXPECTED;
  const canvas=document.getElementById('overlay-canvas');
  const W=canvas.width, H=canvas.height;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const r=Math.max(10,Math.min(20,W*0.02));
  results.forEach(p=>{
    const col=p.detected?'rgba(0,230,118,.9)':'rgba(255,61,61,.9)';
    ctx.beginPath(); ctx.arc(p.cx,p.cy,r,0,Math.PI*2);
    ctx.fillStyle=p.detected?'rgba(0,230,118,.08)':'rgba(255,61,61,.15)'; ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.stroke();
    if(!p.detected){
      ctx.beginPath();
      ctx.moveTo(p.cx-r*.45,p.cy-r*.45); ctx.lineTo(p.cx+r*.45,p.cy+r*.45);
      ctx.moveTo(p.cx+r*.45,p.cy-r*.45); ctx.lineTo(p.cx-r*.45,p.cy+r*.45);
      ctx.strokeStyle='rgba(255,61,61,.9)'; ctx.lineWidth=2; ctx.stroke();
    }
    ctx.fillStyle=col;
    ctx.font=`bold ${Math.max(7,Math.round(r*.6))}px monospace`;
    ctx.textAlign='center'; ctx.fillText(p.id,p.cx,p.cy-r-2);
  });

  const ov=document.getElementById('result-overlay');
  const rb=document.getElementById('result-big');
  rb.textContent=isOK?'OK':'NOK'; rb.className='result-big '+(isOK?'ok':'nok');
  ov.classList.add('show'); setTimeout(()=>ov.classList.remove('show'),2200);
  isOK?playOK():playFail();

  document.getElementById('counter-box').className='counter-box '+(isOK?'ok':'nok');
  document.getElementById('counter-num').textContent=detected;
  document.getElementById('counter-num').className='counter-num '+(isOK?'ok':'nok');
  document.getElementById('status-txt').textContent=isOK?'✓ CORRECTO':'✗ FALTA PERNO';
  document.getElementById('status-txt').className='status-txt '+(isOK?'ok':'nok');
  document.getElementById('badge').textContent=detected+'/17';
  document.getElementById('badge').className='badge '+(isOK?'ok':'nok');
  const missing=results.filter(r=>!r.detected).map(r=>'#'+r.id);
  document.getElementById('missing').textContent=missing.length?'Faltan: '+missing.join(' '):'';
  addLog((isOK?'✓ OK':'✗ NOK')+' '+detected+'/17'+(missing.length?' · '+missing.join(','):''), isOK?'ok':'nok');
}

function loadFile(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      fileImage=img;
      document.getElementById('video').style.display='none';
      const canvas=document.getElementById('overlay-canvas');
      const W=canvas.parentElement.clientWidth, H=canvas.parentElement.clientHeight;
      canvas.width=W; canvas.height=H;
      const ctx=canvas.getContext('2d');
      const scale=Math.min(W/img.naturalWidth,H/img.naturalHeight);
      const offX=(W-img.naturalWidth*scale)/2, offY=(H-img.naturalHeight*scale)/2;
      ctx.drawImage(img,offX,offY,img.naturalWidth*scale,img.naturalHeight*scale);
      const r=Math.max(10,Math.min(20,W*0.02));
      TEMPLATE.forEach(p=>{
        const px=offX+p.x*img.naturalWidth*scale, py=offY+p.y*img.naturalHeight*scale;
        ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2);
        ctx.strokeStyle='rgba(0,230,118,.8)'; ctx.lineWidth=2; ctx.stroke();
        ctx.fillStyle='rgba(0,230,118,.7)';
        ctx.font=`bold ${Math.max(7,Math.round(r*.6))}px monospace`;
        ctx.textAlign='center'; ctx.fillText(p.id,px,py-r-2);
      });
      addLog('Imagen: '+file.name);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function setMode(m) {
  mode=m;
  document.getElementById('tab-cam').classList.toggle('active',m==='camera');
  document.getElementById('tab-file').classList.toggle('active',m==='file');
  document.getElementById('cam-ctrl').style.display=m==='camera'?'block':'none';
  document.getElementById('file-ctrl').style.display=m==='file'?'block':'none';
  document.getElementById('video').style.display=m==='camera'?'block':'none';
  if(m==='camera') initCameras();
  else {
    if(stream) stream.getTracks().forEach(t=>t.stop());
    if(overlayRAF){cancelAnimationFrame(overlayRAF);overlayRAF=null;}
    document.getElementById('hdr-dot').className='dot amber';
    const oc=document.getElementById('overlay-canvas');
    oc.getContext('2d').clearRect(0,0,oc.width,oc.height);
  }
}

function resetScan() {
  document.getElementById('counter-box').className='counter-box';
  document.getElementById('counter-num').textContent='—';
  document.getElementById('counter-num').className='counter-num';
  document.getElementById('status-txt').textContent='LISTO';
  document.getElementById('status-txt').className='status-txt idle';
  document.getElementById('badge').textContent='—/17';
  document.getElementById('badge').className='badge';
  document.getElementById('missing').textContent='';
  if(mode==='camera') startOverlayLoop();
  else {
    const oc=document.getElementById('overlay-canvas');
    oc.getContext('2d').clearRect(0,0,oc.width,oc.height);
    fileImage=null;
    document.getElementById('video').style.display='none';
  }
}

function addLog(msg,type) {
  const d=document.createElement('div');
  d.className='log-entry'+(type?' '+type:'');
  d.textContent=new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+' '+msg;
  const c=document.getElementById('log');
  c.insertBefore(d,c.firstChild);
  if(c.children.length>10) c.lastChild.remove();
