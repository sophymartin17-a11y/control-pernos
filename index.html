<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Control Pernos — C134-01</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--green:#00e676;--red:#ff3d3d;--amber:#ffab00;--text:#dde8e0;--dim:#5a6e60;--bg:#0a0c0b;--surface:rgba(10,12,11,0.92);--border:rgba(255,255,255,0.1);--mono:'Share Tech Mono',monospace;--sans:'Barlow',sans-serif;--cond:'Barlow Condensed',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);}

/* ── SETUP SCREEN ── */
#setup-screen{
  position:fixed;inset:0;z-index:100;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}
.setup-card{
  width:100%;max-width:400px;
  background:#111413;
  border:1px solid rgba(255,255,255,0.12);
  border-radius:12px;
  padding:32px 28px;
}
.setup-logo{
  font-family:var(--cond);font-weight:900;font-size:22px;letter-spacing:3px;
  color:var(--green);margin-bottom:4px;
}
.setup-sub{font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:28px;font-family:var(--mono);}
.setup-label{font-size:11px;color:var(--dim);letter-spacing:1px;margin-bottom:6px;font-family:var(--mono);}
.setup-input{
  width:100%;background:#0d0f0e;border:1px solid rgba(255,255,255,0.15);
  border-radius:6px;color:var(--text);font-family:var(--mono);font-size:13px;
  padding:12px 14px;outline:none;transition:border-color 0.2s;
  -webkit-text-security:disc;
}
.setup-input:focus{border-color:var(--green);}
.setup-hint{font-size:10px;color:var(--dim);margin-top:6px;line-height:1.5;}
.setup-hint a{color:var(--green);text-decoration:none;}
.setup-btn{
  width:100%;margin-top:20px;padding:14px;
  background:var(--green);border:none;border-radius:6px;
  color:#0a0c0b;font-family:var(--cond);font-weight:700;
  font-size:17px;letter-spacing:2px;cursor:pointer;transition:opacity 0.2s;
}
.setup-btn:hover{opacity:0.88;}
.setup-btn:disabled{opacity:0.4;cursor:not-allowed;}
.setup-error{
  margin-top:10px;padding:8px 12px;
  background:rgba(255,61,61,0.1);border:1px solid rgba(255,61,61,0.3);
  border-radius:4px;font-size:11px;color:var(--red);
  font-family:var(--mono);display:none;
}
.setup-testing{
  margin-top:10px;font-size:11px;color:var(--amber);
  font-family:var(--mono);letter-spacing:1px;display:none;
}

/* ── MAIN APP ── */
#app-screen{display:none;}
#video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
#ref-overlay{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;opacity:0.35;pointer-events:none;transition:opacity 0.2s;}
#overlay-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:3;pointer-events:none;}
#snap-canvas{display:none;}

.corners{position:fixed;inset:12px;pointer-events:none;z-index:4;}
.c{position:absolute;width:20px;height:20px;}
.c.tl{top:0;left:0;border-top:2px solid var(--green);border-left:2px solid var(--green);}
.c.tr{top:0;right:0;border-top:2px solid var(--green);border-right:2px solid var(--green);}
.c.bl{bottom:0;left:0;border-bottom:2px solid var(--green);border-left:2px solid var(--green);}
.c.br{bottom:0;right:0;border-bottom:2px solid var(--green);border-right:2px solid var(--green);}

.scan-line{position:fixed;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);box-shadow:0 0 8px var(--green);z-index:20;top:0;opacity:0;pointer-events:none;}
.scan-line.go{opacity:1;animation:scanmove 1s ease-in-out forwards;}
@keyframes scanmove{0%{top:0%}100%{top:100%}}

.result-overlay{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s;}
.result-overlay.show{opacity:1;}
.result-big{font-family:var(--cond);font-weight:900;font-size:min(40vw,220px);letter-spacing:-4px;text-shadow:0 0 80px currentColor;animation:pop .3s cubic-bezier(.17,.89,.32,1.28);}
.result-big.ok{color:var(--green);}
.result-big.nok{color:var(--red);}
@keyframes pop{0%{transform:scale(.2);opacity:0}100%{transform:scale(1);opacity:1}}

/* Analyzing overlay */
.analyzing{position:fixed;inset:0;z-index:25;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:rgba(0,0,0,0.6);}
.analyzing.show{display:flex;}
.spinner{width:40px;height:40px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.analyzing-txt{font-family:var(--mono);font-size:12px;color:var(--green);letter-spacing:3px;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

header{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);backdrop-filter:blur(8px);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--dim);transition:all .3s;}
.dot.green{background:var(--green);box-shadow:0 0 8px var(--green);}
.hdr-title{font-family:var(--cond);font-weight:700;font-size:15px;letter-spacing:2px;color:var(--text);}
.hdr-ref{font-size:9px;color:rgba(255,255,255,.4);margin-top:1px;font-family:var(--mono);}
.badge{font-size:11px;padding:3px 10px;border:1px solid var(--border);border-radius:2px;color:rgba(255,255,255,.5);font-family:var(--mono);}
.badge.ok{border-color:rgba(0,230,118,.6);color:var(--green);}
.badge.nok{border-color:rgba(255,61,61,.6);color:var(--red);}

.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:10;background:var(--surface);border-top:1px solid var(--border);backdrop-filter:blur(8px);padding:10px 14px;display:flex;flex-direction:column;gap:8px;}

.slider-row{display:flex;align-items:center;gap:8px;}
.slider-lbl{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:2px;white-space:nowrap;font-family:var(--mono);}
input[type=range]{flex:1;accent-color:var(--green);height:3px;}
.slider-val{font-size:9px;color:var(--amber);min-width:30px;text-align:right;font-family:var(--mono);}

.action-row{display:flex;gap:8px;align-items:center;}
.btn-scan{flex:1;padding:13px;background:transparent;border:2px solid var(--green);border-radius:4px;color:var(--green);font-family:var(--cond);font-weight:700;font-size:18px;letter-spacing:3px;cursor:pointer;position:relative;overflow:hidden;transition:color .2s;}
.btn-scan::before{content:'';position:absolute;inset:0;background:var(--green);transform:translateY(101%);transition:transform .2s;}
.btn-scan:hover{color:#0a0c0b;}
.btn-scan:hover::before{transform:translateY(0);}
.btn-scan span{position:relative;z-index:1;}
.btn-scan:active{transform:scale(.97);}
.btn-scan:disabled{border-color:var(--dim);color:var(--dim);cursor:not-allowed;}
.btn-scan:disabled::before{display:none;}

.btn-sec{padding:13px 14px;background:transparent;border:1px solid var(--border);border-radius:3px;color:rgba(255,255,255,.4);cursor:pointer;font-size:16px;transition:all .2s;}
.btn-sec:hover{border-color:rgba(255,255,255,.4);color:#fff;}

.result-strip{display:none;align-items:center;gap:12px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.08);}
.result-strip.show{display:flex;}
.res-num{font-family:var(--cond);font-weight:900;font-size:36px;line-height:1;}
.res-num.ok{color:var(--green);}
.res-num.nok{color:var(--red);}
.res-txt{font-size:10px;color:rgba(255,255,255,.5);line-height:1.7;font-family:var(--mono);}
.res-miss{font-size:10px;color:var(--red);font-family:var(--mono);}
.res-conf{font-size:9px;color:var(--dim);font-family:var(--mono);margin-top:2px;}

/* Admin gesture: tap header 5x to reset */
</style>
</head>
<body>

<!-- ── SETUP SCREEN ── -->
<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-logo">CONTROL PERNOS</div>
    <div class="setup-sub">C134-01 · CONFIGURACIÓN INICIAL</div>

    <div class="setup-label">API KEY (GROQ)</div>
    <input type="password" class="setup-input" id="setup-key"
      placeholder="gsk_..." autocomplete="off" spellcheck="false">
    <div class="setup-hint">
      Obtén tu key gratuita en <a href="https://console.groq.com/keys" target="_blank">console.groq.com</a><br>
      Se guardará en este dispositivo. No será visible para el operario.
    </div>
    <div class="setup-testing" id="setup-testing">⏳ VERIFICANDO CONEXIÓN...</div>
    <div class="setup-error" id="setup-error"></div>
    <button class="setup-btn" id="setup-btn" onclick="setupSave()">GUARDAR Y CONTINUAR</button>
  </div>
</div>

<script>
const EXPECTED = 17;
let stream = null, overlayRAF = null;
let headerTaps = 0, headerTapTimer = null;

// ── SETUP ─────────────────────────────────────────────────────
function getKey() { return localStorage.getItem('groq_api_key') || ''; }

async function setupSave() {
  const key = document.getElementById('setup-key').value.trim();
  if (!key || !key.startsWith('gsk_')) {
    showSetupError('La key debe empezar por gsk_');
    return;
  }
  document.getElementById('setup-btn').disabled = true;
  document.getElementById('setup-testing').style.display = 'block';
  document.getElementById('setup-error').style.display = 'none';

  // Test key
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+key},
      body: JSON.stringify({
        model: 'meta-llama/llama-4-scout-17b-16e-instruct',
        messages: [{role:'user',content:'Di solo: OK'}],
        max_tokens: 5, temperature: 0
      })
    });
    if (!res.ok) {
      const e = await res.json();
      throw new Error(e.error?.message || 'Error ' + res.status);
    }
    // Valid!
    localStorage.setItem('groq_api_key', key);
    launchApp();
  } catch(e) {
    showSetupError('Error: ' + e.message);
    document.getElementById('setup-btn').disabled = false;
    document.getElementById('setup-testing').style.display = 'none';
  }
}

function showSetupError(msg) {
  const el = document.getElementById('setup-error');
  el.textContent = msg; el.style.display = 'block';
}

function launchApp() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  initCamera();

  // Admin: tap header 7x rapidly to reset key
  document.getElementById('header').addEventListener('click', () => {
    headerTaps++;
    clearTimeout(headerTapTimer);
    headerTapTimer = setTimeout(() => { headerTaps = 0; }, 2000);
    if (headerTaps >= 7) {
      headerTaps = 0;
      if (confirm('¿Resetear configuración?')) {
        localStorage.removeItem('groq_api_key');
        location.reload();
      }
    }
  });
}

// ── CAMERA ────────────────────────────────────────────────────
async function initCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {facingMode:'environment', width:{ideal:1920}, height:{ideal:1080}}
    });
    const v = document.getElementById('video');
    v.srcObject = stream;
    document.getElementById('hdr-dot').className = 'dot green';
    startOverlayLoop();
  } catch(e) {
    document.getElementById('hdr-dot').className = 'dot';
  }
}

function startOverlayLoop() {
  if (overlayRAF) cancelAnimationFrame(overlayRAF);
  const v = document.getElementById('video');
  function loop() {
    if (v.readyState >= 2 && v.videoWidth > 0) drawCircles(v.videoWidth, v.videoHeight);
    overlayRAF = requestAnimationFrame(loop);
  }
  loop();
}

function drawCircles(srcW, srcH) {
  const canvas = document.getElementById('overlay-canvas');
  const W = window.innerWidth, H = window.innerHeight;
  if (canvas.width !== W) canvas.width = W;
  if (canvas.height !== H) canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const scale = Math.max(W/srcW, H/srcH);
  const offX = (W-srcW*scale)/2, offY = (H-srcH*scale)/2;
  const r = Math.max(12, Math.min(22, W*0.025));
  // Just draw guide circles — no numbers during live view to keep it clean
  const TEMPLATE_NX = [0.135,0.483,0.841,0.141,0.201,0.390,0.485,0.595,0.786,0.845,0.148,0.847,0.409,0.603,0.176,0.508,0.857];
  const TEMPLATE_NY = [0.097,0.088,0.077,0.211,0.222,0.216,0.202,0.211,0.202,0.187,0.303,0.283,0.588,0.637,0.861,0.861,0.862];
  for (let i=0; i<17; i++) {
    const px = offX + TEMPLATE_NX[i]*srcW*scale;
    const py = offY + TEMPLATE_NY[i]*srcH*scale;
    ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,230,118,0.65)'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px-r*.4,py); ctx.lineTo(px+r*.4,py);
    ctx.moveTo(px,py-r*.4); ctx.lineTo(px,py+r*.4);
    ctx.strokeStyle='rgba(0,230,118,0.35)'; ctx.lineWidth=1.5; ctx.stroke();
  }
}

// ── SCAN (Groq AI) ─────────────────────────────────────────────
async function doScan() {
  const apiKey = getKey();
  if (!apiKey) return;

  if (overlayRAF) { cancelAnimationFrame(overlayRAF); overlayRAF = null; }

  // Capture frame
  const v = document.getElementById('video');
  const snap = document.getElementById('snap-canvas');
  snap.width = v.videoWidth || 1280;
  snap.height = v.videoHeight || 720;
  snap.getContext('2d').drawImage(v, 0, 0);

  // Animate scan line
  const sl = document.getElementById('scan-line');
  sl.classList.remove('go'); void sl.offsetWidth; sl.classList.add('go');

  // Show analyzing
  document.getElementById('analyzing').classList.add('show');
  document.getElementById('btn-scan').disabled = true;
  document.getElementById('result-strip').classList.remove('show');

  // Convert to base64 (resize to 800px max for speed)
  const tmpCanvas = document.createElement('canvas');
  const maxDim = 1024;
  const ratio = Math.min(maxDim/snap.width, maxDim/snap.height, 1);
  tmpCanvas.width = Math.round(snap.width*ratio);
  tmpCanvas.height = Math.round(snap.height*ratio);
  tmpCanvas.getContext('2d').drawImage(snap, 0, 0, tmpCanvas.width, tmpCanvas.height);
  const imgB64 = tmpCanvas.toDataURL('image/jpeg', 0.85).split(',')[1];

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body: JSON.stringify({
        model: 'meta-llama/llama-4-scout-17b-16e-instruct',
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image_url',
              image_url: {url: 'data:image/jpeg;base64,' + imgB64}
            },
            {
              type: 'text',
              text: `Eres inspector de calidad en una fábrica de piezas metálicas.

En esta imagen hay una chapa metálica plana (gris/aluminio). Sobre ella hay pernos M4 soldados (projection welding studs): pequeños vástagos cilíndricos metálicos que sobresalen de la superficie, de color cobrizo/dorado o metálico brillante.

CUENTA SOLO los pernos M4 soldados visibles en la cara plana de la pieza.
NO cuentes agujeros, tornillos del utillaje, ni elementos del fondo.
Se esperan exactamente 17 pernos.

Responde ÚNICAMENTE en JSON válido, sin texto adicional:
{"pernos_detectados": <número entero>, "confianza": "alta|media|baja", "observaciones": "nota breve"}`
            }
          ]
        }],
        temperature: 0.1,
        max_tokens: 150,
        response_format: {type: 'json_object'}
      })
    });

    if (!res.ok) {
      const e = await res.json();
      throw new Error(e.error?.message || 'Error API ' + res.status);
    }

    const data = await res.json();
    const text = data.choices[0].message.content;
    const result = JSON.parse(text);
    showResult(result);

  } catch(e) {
    document.getElementById('analyzing').classList.remove('show');
    document.getElementById('btn-scan').disabled = false;
    alert('Error: ' + e.message);
    startOverlayLoop();
  }
}

// ── SHOW RESULT ───────────────────────────────────────────────
function showResult(result) {
  document.getElementById('analyzing').classList.remove('show');
  document.getElementById('btn-scan').disabled = false;

  const detected = result.pernos_detectados;
  const isOK = detected === EXPECTED;

  // Big flash
  const ov = document.getElementById('result-overlay');
  const rb = document.getElementById('result-big');
  rb.textContent = isOK ? 'OK' : 'NOK';
  rb.className = 'result-big ' + (isOK ? 'ok' : 'nok');
  ov.classList.add('show');
  setTimeout(() => ov.classList.remove('show'), 2200);

  // Sound
  isOK ? playOK() : playFail();

  // Badge
  document.getElementById('badge').textContent = detected + '/17';
  document.getElementById('badge').className = 'badge ' + (isOK ? 'ok' : 'nok');

  // Result strip
  const strip = document.getElementById('result-strip');
  strip.classList.add('show');
  const num = document.getElementById('res-num');
  num.textContent = detected;
  num.className = 'res-num ' + (isOK ? 'ok' : 'nok');
  document.getElementById('res-txt').textContent = isOK
    ? '✓ Todos los pernos presentes'
    : '✗ ' + (EXPECTED - detected) + ' perno(s) faltante(s)';
  document.getElementById('res-miss').textContent = '';
  document.getElementById('res-conf').textContent = 'Confianza IA: ' + (result.confianza || '—').toUpperCase()
    + (result.observaciones ? ' · ' + result.observaciones : '');

  // Draw circles on overlay (green = OK state, red = NOK)
  const canvas = document.getElementById('overlay-canvas');
  const ctx = canvas.getContext('2d');
  // Flash background color
  ctx.fillStyle = isOK ? 'rgba(0,230,118,0.08)' : 'rgba(255,61,61,0.08)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  setTimeout(() => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    startOverlayLoop();
  }, 2500);
}

// ── RESET ────────────────────────────────────────────────────
function resetScan() {
  document.getElementById('badge').textContent = '—/17';
  document.getElementById('badge').className = 'badge';
  document.getElementById('result-strip').classList.remove('show');
  startOverlayLoop();
}

// ── SOUNDS ───────────────────────────────────────────────────
function playOK(){try{const c=new(window.AudioContext||window.webkitAudioContext)(),t=c.currentTime;[523,659,784].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.28,t+i*.13);g.gain.exponentialRampToValueAtTime(.001,t+i*.13+.28);o.start(t+i*.13);o.stop(t+i*.13+.3);});}catch(e){}}
function playFail(){try{const c=new(window.AudioContext||window.webkitAudioContext)(),t=c.currentTime;[220,185].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(.35,t+i*.22);g.gain.exponentialRampToValueAtTime(.001,t+i*.22+.38);o.start(t+i*.22);o.stop(t+i*.22+.42);});}catch(e){}}

// ── INIT ─────────────────────────────────────────────────────
if (getKey()) {
  launchApp();
} else {
  document.getElementById('setup-screen').style.display = 'flex';
}
