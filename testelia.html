<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Control Pernos — C134-01</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<script async src="https://docs.opencv.org/4.9.0/opencv.js" onload="onCvLoaded()" id="opencv-script"></script>
<style>
:root{--green:#00e676;--red:#ff3d3d;--amber:#ffab00;--dim:#5a6e60;--bg:#0a0c0b;--surface:rgba(10,12,11,0.92);--border:rgba(255,255,255,0.1);--mono:'Share Tech Mono',monospace;--cond:'Barlow Condensed',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:#dde8e0;font-family:var(--mono);}

/* SETUP */
#setup{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;}
.card{width:100%;max-width:400px;background:#111413;border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:32px 28px;}
.card-title{font-family:var(--cond);font-weight:900;font-size:22px;letter-spacing:3px;color:var(--green);margin-bottom:4px;}
.card-sub{font-size:10px;color:var(--dim);letter-spacing:2px;margin-bottom:28px;}
.flabel{font-size:10px;color:var(--dim);letter-spacing:1px;margin-bottom:6px;}
.finput{width:100%;background:#0d0f0e;border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:#dde8e0;font-family:var(--mono);font-size:13px;padding:12px 14px;outline:none;transition:border-color 0.2s;-webkit-text-security:disc;}
.finput:focus{border-color:var(--green);}
.fhint{font-size:10px;color:var(--dim);margin-top:6px;line-height:1.5;}
.fhint a{color:var(--green);text-decoration:none;}
.fbtn{width:100%;margin-top:20px;padding:14px;background:var(--green);border:none;border-radius:6px;color:#0a0c0b;font-family:var(--cond);font-weight:700;font-size:17px;letter-spacing:2px;cursor:pointer;transition:opacity 0.2s;}
.fbtn:disabled{opacity:0.4;cursor:not-allowed;}
.ferr{margin-top:10px;padding:8px 12px;background:rgba(255,61,61,0.1);border:1px solid rgba(255,61,61,0.3);border-radius:4px;font-size:11px;color:var(--red);display:none;}
.ftesting{margin-top:8px;font-size:11px;color:var(--amber);letter-spacing:1px;display:none;}

/* APP */
#app{display:none;}
#video{position:fixed;inset:0;width:100%;height:100%;object-fit:contain;background:#000;z-index:1;}
#ref-overlay{position:fixed;inset:0;width:100%;height:100%;object-fit:contain;z-index:2;opacity:0.35;pointer-events:none;transition:opacity 0.2s;}
#overlay-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:3;pointer-events:none;}
#snap-canvas{display:none;}
.corners{position:fixed;inset:12px;pointer-events:none;z-index:4;}
.c{position:absolute;width:20px;height:20px;}
.c.tl{top:0;left:0;border-top:2px solid var(--green);border-left:2px solid var(--green);}
.c.tr{top:0;right:0;border-top:2px solid var(--green);border-right:2px solid var(--green);}
.c.bl{bottom:0;left:0;border-bottom:2px solid var(--green);border-left:2px solid var(--green);}
.c.br{bottom:0;right:0;border-bottom:2px solid var(--green);border-right:2px solid var(--green);}
.scan-line{position:fixed;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);box-shadow:0 0 8px var(--green);z-index:20;top:0;opacity:0;pointer-events:none;}
.scan-line.go{opacity:1;animation:scan .9s ease-in-out forwards;}
@keyframes scan{0%{top:0%}100%{top:100%}}
.result-overlay{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s;}
.result-overlay.show{opacity:1;}
.result-big{font-family:var(--cond);font-weight:900;font-size:min(40vw,220px);letter-spacing:-4px;text-shadow:0 0 80px currentColor;animation:pop .3s cubic-bezier(.17,.89,.32,1.28);}
.result-big.ok{color:var(--green);}
.result-big.nok{color:var(--red);}
@keyframes pop{0%{transform:scale(.2);opacity:0}100%{transform:scale(1);opacity:1}}
.analyzing{position:fixed;inset:0;z-index:25;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:rgba(0,0,0,0.65);}
.analyzing.show{display:flex;}
.spinner{width:44px;height:44px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.atxt{font-size:11px;color:var(--green);letter-spacing:3px;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
header{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);backdrop-filter:blur(8px);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--dim);transition:all .3s;}
.dot.on{background:var(--green);box-shadow:0 0 8px var(--green);}
.htitle{font-family:var(--cond);font-weight:700;font-size:15px;letter-spacing:2px;color:#dde8e0;}
.href{font-size:9px;color:rgba(255,255,255,.4);margin-top:1px;}
.badge{font-size:11px;padding:3px 10px;border:1px solid var(--border);border-radius:2px;color:rgba(255,255,255,.5);}
.badge.ok{border-color:rgba(0,230,118,.6);color:var(--green);}
.badge.nok{border-color:rgba(255,61,61,.6);color:var(--red);}
.bottom{position:fixed;bottom:0;left:0;right:0;z-index:10;background:var(--surface);border-top:1px solid var(--border);backdrop-filter:blur(8px);padding:10px 14px;display:flex;flex-direction:column;gap:8px;}
.srow{display:flex;align-items:center;gap:8px;}
.slbl{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:2px;white-space:nowrap;}
input[type=range]{flex:1;accent-color:var(--green);height:3px;}
.sval{font-size:9px;color:var(--amber);min-width:30px;text-align:right;}
.arow{display:flex;gap:8px;align-items:center;}
.bscan{flex:1;padding:13px;background:transparent;border:2px solid var(--green);border-radius:4px;color:var(--green);font-family:var(--cond);font-weight:700;font-size:18px;letter-spacing:3px;cursor:pointer;position:relative;overflow:hidden;transition:color .2s;}
.bscan::before{content:'';position:absolute;inset:0;background:var(--green);transform:translateY(101%);transition:transform .2s;}
.bscan:hover{color:#0a0c0b;}
.bscan:hover::before{transform:translateY(0);}
.bscan span{position:relative;z-index:1;}
.bscan:active{transform:scale(.97);}
.bscan:disabled{border-color:var(--dim);color:var(--dim);cursor:not-allowed;}
.bscan:disabled::before{display:none;}
.breset{padding:13px 14px;background:transparent;border:1px solid var(--border);border-radius:3px;color:rgba(255,255,255,.4);cursor:pointer;font-size:16px;transition:all .2s;}
.breset:hover{border-color:rgba(255,255,255,.4);color:#fff;}
.rstrip{display:none;align-items:center;gap:12px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.08);}
.rstrip.show{display:flex;}
.rnum{font-family:var(--cond);font-weight:900;font-size:36px;line-height:1;}
.rnum.ok{color:var(--green);}
.rnum.nok{color:var(--red);}
.rtxt{font-size:10px;color:rgba(255,255,255,.5);line-height:1.7;}
.rmiss{font-size:10px;color:var(--red);margin-top:2px;}
.bscan.cv{border-color:var(--amber);color:var(--amber);}
.bscan.cv::before{background:var(--amber);}
.bscan.cv:hover{color:#0a0c0b;}
.cv-status{font-size:8px;letter-spacing:1px;text-align:center;padding:2px 0;}
.cv-status.loading{color:var(--amber);}
.cv-status.ready{color:var(--green);}
.cv-status.fail{color:var(--red);}
.mode-row{display:flex;gap:6px;align-items:center;justify-content:center;}
.mode-btn{padding:4px 10px;font-size:9px;letter-spacing:1px;border:1px solid var(--border);border-radius:3px;background:transparent;color:rgba(255,255,255,.4);cursor:pointer;font-family:var(--mono);transition:all .2s;}
.mode-btn.active{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.08);}
.mode-btn.active.cv-mode{border-color:var(--amber);color:var(--amber);background:rgba(255,171,0,.08);}
</style>
</head>
<body>

<div id="setup">
  <div class="card">
    <div class="card-title">CONTROL PERNOS</div>
    <div class="card-sub">C134-01 · CONFIGURACIÓN</div>
    <div class="flabel">GROQ API KEY</div>
    <input class="finput" id="setup-key" type="password" placeholder="gsk_..." autocomplete="off">
    <div class="fhint">Key gratuita en <a href="https://console.groq.com/keys" target="_blank">console.groq.com</a><br>Se guarda en este dispositivo. El operario no la verá.</div>
    <div class="ftesting" id="ftesting">⏳ VERIFICANDO...</div>
    <div class="ferr" id="ferr"></div>
    <button class="fbtn" id="fbtn" onclick="saveKey()">GUARDAR Y CONTINUAR</button>
  </div>
</div>

<script>
// Template: 17 exact positions (normalized 0..1) from calibrated photo
const T = [
  {id:1,  x:0.135, y:0.097}, {id:2,  x:0.483, y:0.088}, {id:3,  x:0.841, y:0.077},
  {id:4,  x:0.141, y:0.211}, {id:5,  x:0.201, y:0.222}, {id:6,  x:0.390, y:0.216},
  {id:7,  x:0.485, y:0.202}, {id:8,  x:0.595, y:0.211}, {id:9,  x:0.786, y:0.202},
  {id:10, x:0.845, y:0.187}, {id:11, x:0.148, y:0.303}, {id:12, x:0.847, y:0.283},
  {id:13, x:0.409, y:0.588}, {id:14, x:0.603, y:0.637}, {id:15, x:0.176, y:0.861},
  {id:16, x:0.508, y:0.861}, {id:17, x:0.857, y:0.862},
];
const EXPECTED = 17;
const CROP_R = 0.06; // crop radius as fraction of image width
let stream = null, raf = null, taps = 0, tapTimer = null;

// ── KEY MANAGEMENT ──────────────────────────────────────────
const getKey = () => localStorage.getItem('gk') || '';

async function saveKey() {
  const k = document.getElementById('setup-key').value.trim();
  if (!k.startsWith('gsk_')) { showErr('La key debe empezar por gsk_'); return; }
  document.getElementById('fbtn').disabled = true;
  document.getElementById('ftesting').style.display = 'block';
  document.getElementById('ferr').style.display = 'none';
  try {
    const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+k},
      body: JSON.stringify({model:'meta-llama/llama-4-scout-17b-16e-instruct',messages:[{role:'user',content:'OK'}],max_tokens:3})
    });
    if (!r.ok) throw new Error((await r.json()).error?.message || 'Error '+r.status);
    localStorage.setItem('gk', k);
    startApp();
  } catch(e) {
    showErr(e.message);
    document.getElementById('fbtn').disabled = false;
    document.getElementById('ftesting').style.display = 'none';
  }
}

function showErr(m) {
  const el = document.getElementById('ferr');
  el.textContent = m; el.style.display = 'block';
}

// ── APP START ───────────────────────────────────────────────
function startApp() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initCam();
  // Admin reset: tap header 7x
  document.getElementById('hdr').addEventListener('click', () => {
    taps++; clearTimeout(tapTimer);
    tapTimer = setTimeout(() => taps=0, 2000);
    if (taps >= 7) {
      taps = 0;
      if (confirm('¿Borrar configuración y reiniciar?')) {
        localStorage.removeItem('gk'); location.reload();
      }
    }
  });
}

// ── CAMERA ──────────────────────────────────────────────────
async function initCam() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {facingMode:'environment', width:{ideal:1920}, height:{ideal:1080}}
    });
    document.getElementById('video').srcObject = stream;
    document.getElementById('dot').className = 'dot on';
    startLoop();
  } catch(e) {}
}

function startLoop() {
  if (raf) cancelAnimationFrame(raf);
  const v = document.getElementById('video');
  function loop() {
    if (v.readyState >= 2 && v.videoWidth > 0) drawGuide(v.videoWidth, v.videoHeight);
    raf = requestAnimationFrame(loop);
  }
  loop();
}

function drawGuide(sw, sh) {
  const c = document.getElementById('overlay-canvas');
  const W = window.innerWidth, H = window.innerHeight;
  if (c.width!==W) c.width=W; if (c.height!==H) c.height=H;
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const sc = Math.max(W/sw, H/sh);
  const ox=(W-sw*sc)/2, oy=(H-sh*sc)/2;
  const r = Math.max(12, Math.min(20, W*0.022));
  T.forEach(p => {
    const px=ox+p.x*sw*sc, py=oy+p.y*sh*sc;
    ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,230,118,0.65)'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px-r*.4,py); ctx.lineTo(px+r*.4,py);
    ctx.moveTo(px,py-r*.4); ctx.lineTo(px,py+r*.4);
    ctx.strokeStyle='rgba(0,230,118,0.35)'; ctx.lineWidth=1.5; ctx.stroke();
  });
}

// ── SCAN ────────────────────────────────────────────────────
async function doScan() {
  const key = getKey(); if (!key) return;
  if (raf) { cancelAnimationFrame(raf); raf=null; }

  // Capture
  const v = document.getElementById('video');
  const snap = document.getElementById('snap-canvas');
  snap.width = v.videoWidth||1280; snap.height = v.videoHeight||720;
  snap.getContext('2d').drawImage(v,0,0);

  // Animate
  const sl = document.getElementById('scan-line');
  sl.classList.remove('go'); void sl.offsetWidth; sl.classList.add('go');
  document.getElementById('analyzing').classList.add('show');
  document.getElementById('bscan').disabled = true;
  document.getElementById('rstrip').classList.remove('show');

  // Build crops for each perno position
  const SW = snap.width, SH = snap.height;
  const cropPx = Math.round(CROP_R * SW); // crop half-size in pixels

  // Create a grid image: 17 crops arranged in a strip
  // Each crop is cropPx*2 x cropPx*2, arranged 6 per row
  const cropSize = cropPx * 2;
  const cols = 6, rows = Math.ceil(17/cols);
  const gridW = cols * cropSize, gridH = rows * cropSize;
  const grid = document.createElement('canvas');
  grid.width = gridW; grid.height = gridH;
  const gCtx = grid.getContext('2d');
  gCtx.fillStyle = '#222'; gCtx.fillRect(0,0,gridW,gridH);

  // Map snap coords to display coords (cover scaling)
  const W=window.innerWidth, H=window.innerHeight;
  const sc=Math.max(W/SW,H/SH);
  const ox=(W-SW*sc)/2, oy=(H-SH*sc)/2;

  // For each perno, crop directly from snap canvas
  T.forEach((p,i) => {
    const cx = Math.round(p.x * SW);
    const cy = Math.round(p.y * SH);
    const sx = Math.max(0, cx-cropPx), sy = Math.max(0, cy-cropPx);
    const sw2 = Math.min(cropSize, SW-sx), sh2 = Math.min(cropSize, SH-sy);
    const gx = (i%cols)*cropSize, gy = Math.floor(i/cols)*cropSize;
    gCtx.drawImage(snap, sx,sy,sw2,sh2, gx,gy,cropSize,cropSize);
    // Label
    gCtx.fillStyle='rgba(0,230,118,0.9)';
    gCtx.font=`bold ${Math.round(cropSize*0.18)}px monospace`;
    gCtx.fillText('#'+p.id, gx+4, gy+cropSize*0.22);
  });

  // Also get full image (downscaled)
  const full = document.createElement('canvas');
  const maxD = 800;
  const ratio = Math.min(maxD/SW, maxD/SH, 1);
  full.width=Math.round(SW*ratio); full.height=Math.round(SH*ratio);
  full.getContext('2d').drawImage(snap,0,0,full.width,full.height);
  const fullB64 = full.toDataURL('image/jpeg',0.82).split(',')[1];
  const gridB64 = grid.toDataURL('image/jpeg',0.88).split(',')[1];

  // Build prompt with exact positions
  const posDesc = T.map(p => `#${p.id}: posición (${Math.round(p.x*100)}%,${Math.round(p.y*100)}%)`).join(', ');

  const prompt = `Eres un inspector de calidad de precisión en una fábrica de piezas metálicas.

Te muestro DOS imágenes:
1. La pieza completa (chapa metálica gris con pernos M4 soldados)
2. Una cuadrícula con 17 recortes numerados, cada uno centrado en la posición exacta donde DEBE haber un perno M4

Los pernos M4 soldados son pequeños vástagos metálicos que sobresalen de la superficie (color cobrizo/plateado brillante, ~4mm diámetro).

Para cada recorte numerado del #1 al #17, determina si hay un perno presente o no.

Responde ÚNICAMENTE con JSON válido:
{
  "resultados": [
    {"id": 1, "presente": true},
    {"id": 2, "presente": true},
    ... (los 17)
  ],
  "confianza": "alta|media|baja"
}`;

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body: JSON.stringify({
        model:'meta-llama/llama-4-scout-17b-16e-instruct',
        messages:[{
          role:'user',
          content:[
            {type:'image_url', image_url:{url:'data:image/jpeg;base64,'+fullB64}},
            {type:'image_url', image_url:{url:'data:image/jpeg;base64,'+gridB64}},
            {type:'text', text:prompt}
          ]
        }],
        temperature:0.05,
        max_tokens:400,
        response_format:{type:'json_object'}
      })
    });

    if (!res.ok) throw new Error((await res.json()).error?.message||'Error '+res.status);
    const data = await res.json();
    const result = JSON.parse(data.choices[0].message.content);
    showResult(result, snap, SW, SH);

  } catch(e) {
    document.getElementById('analyzing').classList.remove('show');
    document.getElementById('bscan').disabled = false;
    alert('Error: '+e.message);
    startLoop();
  }
}

// ── SHOW RESULT ─────────────────────────────────────────────
function showResult(result, snap, SW, SH) {
  document.getElementById('analyzing').classList.remove('show');
  document.getElementById('bscan').disabled = false;

  const results = result.resultados || [];
  const present = results.filter(r=>r.presente).length;
  const missing = results.filter(r=>!r.presente).map(r=>'#'+r.id);
  const isOK = present === EXPECTED && missing.length === 0;

  // Draw result circles on overlay
  const c = document.getElementById('overlay-canvas');
  const W=window.innerWidth, H=window.innerHeight;
  if(c.width!==W) c.width=W; if(c.height!==H) c.height=H;
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const sc=Math.max(W/SW,H/SH);
  const ox=(W-SW*sc)/2, oy=(H-SH*sc)/2;
  const r=Math.max(12,Math.min(20,W*0.022));

  T.forEach(p => {
    const res = results.find(r=>r.id===p.id);
    const det = res ? res.presente : true;
    const px=ox+p.x*SW*sc, py=oy+p.y*SH*sc;
    const col=det?'rgba(0,230,118,.9)':'rgba(255,61,61,.9)';
    ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2);
    ctx.fillStyle=det?'rgba(0,230,118,.1)':'rgba(255,61,61,.2)'; ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.stroke();
    if(!det){
      ctx.beginPath();
      ctx.moveTo(px-r*.45,py-r*.45); ctx.lineTo(px+r*.45,py+r*.45);
      ctx.moveTo(px+r*.45,py-r*.45); ctx.lineTo(px-r*.45,py+r*.45);
      ctx.strokeStyle='rgba(255,61,61,.9)'; ctx.lineWidth=2; ctx.stroke();
    }
    ctx.fillStyle=col;
    ctx.font=`bold ${Math.max(9,Math.round(r*.65))}px monospace`;
    ctx.textAlign='center'; ctx.fillText(p.id,px,py-r-3);
  });

  // Big flash
  const ov=document.getElementById('result-overlay');
  const rb=document.getElementById('result-big');
  rb.textContent=isOK?'OK':'NOK'; rb.className='result-big '+(isOK?'ok':'nok');
  ov.classList.add('show'); setTimeout(()=>ov.classList.remove('show'),2200);
  isOK?playOK():playFail();

  document.getElementById('badge').textContent=present+'/17';
  document.getElementById('badge').className='badge '+(isOK?'ok':'nok');

  const strip=document.getElementById('rstrip'); strip.classList.add('show');
  const num=document.getElementById('rnum');
  num.textContent=present; num.className='rnum '+(isOK?'ok':'nok');
  document.getElementById('rtxt').textContent = isOK
    ? '✓ Todos los pernos presentes'
    : '✗ Faltan '+(EXPECTED-present)+' perno(s)';
  document.getElementById('rmiss').textContent = missing.length
    ? 'Posiciones faltantes: '+missing.join(' ') : '';
}

// ── RESET ────────────────────────────────────────────────────
function resetScan() {
  document.getElementById('badge').textContent='—/17';
  document.getElementById('badge').className='badge';
  document.getElementById('rstrip').classList.remove('show');
  startLoop();
}

// ── SOUNDS ───────────────────────────────────────────────────
function playOK(){try{const c=new(window.AudioContext||window.webkitAudioContext)(),t=c.currentTime;[523,659,784].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.28,t+i*.13);g.gain.exponentialRampToValueAtTime(.001,t+i*.13+.28);o.start(t+i*.13);o.stop(t+i*.13+.3);});}catch(e){}}
function playFail(){try{const c=new(window.AudioContext||window.webkitAudioContext)(),t=c.currentTime;[220,185].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(.35,t+i*.22);g.gain.exponentialRampToValueAtTime(.001,t+i*.22+.38);o.start(t+i*.22);o.stop(t+i*.22+.42);});}catch(e){}}

// ── OPENCV STATUS ───────────────────────────────────────────
let cvReady = false;
let scanMode = 'ia'; // 'ia' or 'cv'

function onCvLoaded() {
  // OpenCV.js calls cv.onRuntimeInitialized when WASM is ready
  if (typeof cv !== 'undefined') {
    if (cv.getBuildInformation) {
      cvReady = true;
      updateCvStatus();
    } else {
      cv['onRuntimeInitialized'] = () => { cvReady = true; updateCvStatus(); };
    }
  }
}

function updateCvStatus() {
  const el = document.getElementById('cv-status');
  if (cvReady) {
    el.textContent = 'CV LISTO'; el.className = 'cv-status ready';
  } else {
    el.textContent = 'CV CARGANDO...'; el.className = 'cv-status loading';
  }
}

function setMode(mode) {
  scanMode = mode;
  document.getElementById('mode-ia').className = 'mode-btn' + (mode==='ia'?' active':'');
  document.getElementById('mode-cv').className = 'mode-btn' + (mode==='cv'?' active cv-mode':'');
  const btn = document.getElementById('bscan');
  if (mode === 'cv') {
    btn.className = 'bscan cv';
  } else {
    btn.className = 'bscan';
  }
}

function scanDispatch() {
  if (scanMode === 'cv') {
    if (!cvReady) { alert('OpenCV aún está cargando. Espera unos segundos.'); return; }
    doLocalScan();
  } else {
    doScan();
  }
}

// ── LOCAL SCAN (COLOR + CIRCLE) ─────────────────────────────
function doLocalScan() {
  if (raf) { cancelAnimationFrame(raf); raf = null; }

  // Capture frame
  const v = document.getElementById('video');
  const snap = document.getElementById('snap-canvas');
  snap.width = v.videoWidth || 1280; snap.height = v.videoHeight || 720;
  snap.getContext('2d').drawImage(v, 0, 0);

  // Animate
  const sl = document.getElementById('scan-line');
  sl.classList.remove('go'); void sl.offsetWidth; sl.classList.add('go');
  document.getElementById('atxt').textContent = 'DETECCIÓN LOCAL COLOR+CÍRCULO...';
  document.getElementById('analyzing').classList.add('show');
  document.getElementById('bscan').disabled = true;
  document.getElementById('rstrip').classList.remove('show');

  const SW = snap.width, SH = snap.height;
  const cropPx = Math.round(CROP_R * SW);
  const cropSize = cropPx * 2;

  // Process with a small delay to allow UI to update
  setTimeout(() => {
    try {
      const results = [];

      T.forEach(p => {
        const cx = Math.round(p.x * SW);
        const cy = Math.round(p.y * SH);
        const sx = Math.max(0, cx - cropPx);
        const sy = Math.max(0, cy - cropPx);
        const sw2 = Math.min(cropSize, SW - sx);
        const sh2 = Math.min(cropSize, SH - sy);

        // Extract crop to temp canvas
        const tmpC = document.createElement('canvas');
        tmpC.width = sw2; tmpC.height = sh2;
        tmpC.getContext('2d').drawImage(snap, sx, sy, sw2, sh2, 0, 0, sw2, sh2);

        // Analyze with OpenCV
        const detected = analyzeWithCV(tmpC, sw2, sh2);
        results.push({ id: p.id, presente: detected });
      });

      // Format as expected by showResult
      const resultObj = { resultados: results, confianza: 'local-cv' };
      showResult(resultObj, snap, SW, SH);

    } catch (e) {
      document.getElementById('analyzing').classList.remove('show');
      document.getElementById('bscan').disabled = false;
      alert('Error CV: ' + e.message);
      startLoop();
    }
  }, 100);
}

function analyzeWithCV(canvas, w, h) {
  // Read image from canvas into OpenCV Mat
  const src = cv.imread(canvas);
  const hsv = new cv.Mat();
  const gray = new cv.Mat();

  // === STEP 1: COLOR DETECTION (HSV) ===
  // Convert to HSV
  cv.cvtColor(src, hsv, cv.COLOR_RGBA2RGB);
  const rgb = hsv.clone();
  cv.cvtColor(rgb, hsv, cv.COLOR_RGB2HSV);
  rgb.delete();

  // Mask for copper/bronze tones (H:5-25, S:50-255, V:80-255)
  const lowCopper = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [5, 50, 80, 0]);
  const highCopper = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [25, 255, 255, 255]);
  const maskCopper = new cv.Mat();
  cv.inRange(hsv, lowCopper, highCopper, maskCopper);

  // Mask for silver/light metallic (H:0-180, S:0-50, V:140-255)
  const lowSilver = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [0, 0, 140, 0]);
  const highSilver = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [180, 50, 255, 255]);
  const maskSilver = new cv.Mat();
  cv.inRange(hsv, lowSilver, highSilver, maskSilver);

  // Mask for golden/warm metallic (H:15-35, S:40-200, V:100-255)
  const lowGold = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [15, 40, 100, 0]);
  const highGold = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [35, 200, 255, 255]);
  const maskGold = new cv.Mat();
  cv.inRange(hsv, lowGold, highGold, maskGold);

  // Combine color masks
  const maskColor = new cv.Mat();
  cv.bitwise_or(maskCopper, maskSilver, maskColor);
  cv.bitwise_or(maskColor, maskGold, maskColor);

  // Clean up with morphological operations
  const kernel = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(3, 3));
  cv.morphologyEx(maskColor, maskColor, cv.MORPH_OPEN, kernel);
  cv.morphologyEx(maskColor, maskColor, cv.MORPH_CLOSE, kernel);

  // Calculate color ratio in central region (inner 60% of crop)
  const margin = Math.round(w * 0.2);
  const roi = maskColor.roi(new cv.Rect(margin, margin, w - 2*margin, h - 2*margin));
  const totalPixels = roi.rows * roi.cols;
  const colorPixels = cv.countNonZero(roi);
  const colorRatio = colorPixels / totalPixels;
  roi.delete();

  // === STEP 2: CIRCLE DETECTION (Hough) ===
  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  cv.GaussianBlur(gray, gray, new cv.Size(7, 7), 1.5);

  const circles = new cv.Mat();
  const minR = Math.round(Math.min(w, h) * 0.08);  // min radius ~8% of crop
  const maxR = Math.round(Math.min(w, h) * 0.45);   // max radius ~45% of crop
  cv.HoughCircles(gray, circles, cv.HOUGH_GRADIENT, 1.2,
    Math.round(Math.min(w, h) * 0.3),  // minDist between circles
    80,   // param1 (Canny high threshold)
    25,   // param2 (accumulator threshold - lower = more sensitive)
    minR, maxR
  );

  const hasCircle = circles.cols > 0;

  // === STEP 3: COMBINED DECISION ===
  // Bolt present if: sufficient color AND circular shape detected
  const COLOR_THRESHOLD = 0.04; // at least 4% of central pixels match bolt color
  const hasColor = colorRatio >= COLOR_THRESHOLD;
  const detected = hasColor && hasCircle;

  // Cleanup all Mats
  [src, hsv, gray, maskCopper, maskSilver, maskGold, maskColor,
   lowCopper, highCopper, lowSilver, highSilver, lowGold, highGold,
   kernel, circles].forEach(m => m.delete());

  return detected;
}
